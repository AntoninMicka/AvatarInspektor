name: Release Firefox Extension

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-firefox:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync vendored runtime
        run: npm run sync:vendor

      - name: Build Firefox package
        run: npm run build:firefox

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension
          path: dist/AvatarInspector-firefox.xpi

      - name: Publish package to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/AvatarInspector-firefox.xpi --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/AvatarInspector-firefox.xpi --generate-notes --title "${GITHUB_REF_NAME}"
          fi
